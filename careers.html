<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Career Explorer — Browse All Careers</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>" />
<style>
* { box-sizing:border-box; margin:0; padding:0; }
:root {
  --navy:#0F172A; --blue:#1D4ED8; --paper:#F8F9FC;
  --muted:#64748B; --border:#E2E8F0;
}
body { font-family:'Sora',sans-serif; background:var(--paper); color:var(--navy); min-height:100vh; }

/* Header */
.site-header {
  background:var(--navy); color:white;
  padding:1.5rem 2rem; text-align:center;
  border-bottom:4px solid var(--blue);
}
.site-header h1 { font-family:'DM Serif Display',serif; font-size:1.8rem; margin-bottom:0.3rem; }
.site-header p  { font-size:0.85rem; color:#94A3B8; font-weight:600; }
.back-link {
  display:inline-flex; align-items:center; gap:0.4rem;
  color:#93C5FD; font-size:0.8rem; font-weight:700;
  text-decoration:none; margin-bottom:0.8rem;
  letter-spacing:0.06em; text-transform:uppercase;
}
.back-link:hover { color:white; }

/* Grade tabs */
.grade-tabs {
  display:flex; gap:0.5rem; justify-content:center; flex-wrap:wrap;
  padding:1.2rem 1rem 0;
}
.grade-tab {
  padding:0.45rem 1.1rem; border-radius:20px; font-size:0.8rem;
  font-weight:800; cursor:pointer; border:2px solid transparent;
  letter-spacing:0.05em; transition:all 0.15s;
}
.grade-tab[data-grade="tkk"]   { background:#FFF7ED; color:#92400E; border-color:#FBBF24; }
.grade-tab[data-grade="12"]    { background:#F0FDF4; color:#065F46; border-color:#34D399; }
.grade-tab[data-grade="35"]    { background:#EFF6FF; color:#1E40AF; border-color:#93C5FD; }
.grade-tab.active              { filter:brightness(0.88); transform:translateY(1px); }

/* Search */
.search-wrap {
  max-width:480px; margin:1rem auto 0; padding:0 1rem;
}
.search-input {
  width:100%; padding:0.7rem 1rem; border:2px solid var(--border);
  border-radius:12px; font-family:'Sora',sans-serif; font-size:0.9rem;
  background:white; color:var(--navy);
}
.search-input:focus { outline:none; border-color:var(--blue); }

/* Main layout */
main { max-width:900px; margin:0 auto; padding:1.5rem 1rem 3rem; }

/* RIASEC section */
.riasec-section { margin-bottom:2rem; }
.riasec-header {
  display:flex; align-items:center; gap:0.8rem;
  padding:0.9rem 1.2rem; border-radius:14px 14px 0 0;
  border:2px solid transparent; border-bottom:none;
  cursor:pointer; user-select:none;
}
.riasec-header .r-emoji  { font-size:1.6rem; }
.riasec-header .r-name   { font-family:'DM Serif Display',serif; font-size:1.2rem; }
.riasec-header .r-full   { font-size:0.75rem; font-weight:700; opacity:0.7; text-transform:uppercase; letter-spacing:0.08em; }
.riasec-header .r-chevron{ margin-left:auto; font-size:0.9rem; transition:transform 0.2s; }
.riasec-header.open .r-chevron { transform:rotate(180deg); }

.riasec-body {
  border:2px solid transparent; border-top:none;
  border-radius:0 0 14px 14px; padding:1rem;
  display:grid; grid-template-columns:1fr 1fr;
  gap:0.8rem;
}
.riasec-body.collapsed { display:none; }

/* Career card */
.career-card {
  background:white; border:2px solid var(--border); border-radius:12px;
  padding:1rem; cursor:pointer; transition:all 0.15s;
  display:flex; align-items:center; gap:0.7rem;
}
.career-card:hover { border-color:var(--blue); transform:translateY(-1px); box-shadow:0 4px 12px rgba(29,78,216,0.1); }
.career-card.active { border-color:var(--blue); background:#EFF6FF; }
.career-card .cc-emoji { font-size:1.5rem; flex-shrink:0; }
.career-card .cc-name  { font-size:0.88rem; font-weight:700; color:var(--navy); line-height:1.3; }
.career-card .cc-type  { font-size:0.7rem; font-weight:600; color:var(--muted); }

/* Detail panel */
.detail-panel {
  background:white; border:2px solid #BFDBFE; border-radius:16px;
  padding:1.5rem; margin-top:1rem; display:none;
  box-shadow:0 4px 20px rgba(29,78,216,0.08);
  grid-column:1/-1;
}
.detail-panel.show { display:block; }
.detail-panel h3 { font-family:'DM Serif Display',serif; font-size:1.4rem; color:var(--navy); margin-bottom:0.8rem; }
.detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:0.8rem; margin-bottom:1rem; }
.detail-box { background:#F8FAFC; border:1.5px solid var(--border); border-radius:10px; padding:0.9rem; font-size:0.88rem; line-height:1.55; }
.detail-box strong { display:block; font-size:0.68rem; font-weight:800; color:var(--blue); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:0.35rem; }
.day-box { background:#F0FDF4; border:2px solid #86EFAC; border-radius:10px; padding:1rem; margin-bottom:0.8rem; font-size:0.88rem; color:#14532D; }
.day-box strong { display:block; font-size:0.68rem; font-weight:800; color:#15803D; text-transform:uppercase; letter-spacing:0.1em; margin-bottom:0.5rem; }
.day-timeline { display:flex; flex-direction:column; gap:0.4rem; }
.day-row { display:flex; gap:0.6rem; }
.day-time { font-size:0.7rem; font-weight:800; color:#15803D; min-width:4rem; padding-top:0.1rem; white-space:nowrap; }
.day-time:empty { display:none; }
.day-task { font-size:0.86rem; }
.pathway-section strong { display:block; font-size:0.68rem; font-weight:800; color:var(--blue); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:0.6rem; }
.pathway-steps { display:flex; flex-direction:column; gap:0.4rem; margin-bottom:0.8rem; }
.pathway-step { display:flex; gap:0.7rem; background:#F8FAFC; border:1.5px solid var(--border); border-radius:8px; padding:0.7rem; font-size:0.86rem; line-height:1.5; }
.pathway-step-icon { font-size:1.2rem; flex-shrink:0; }
.pathway-step-label { font-size:0.68rem; font-weight:800; color:var(--blue); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:0.15rem; }
.colleges-box { background:#FFF7ED; border:2px solid #FCD34D; border-radius:10px; padding:1rem; font-size:0.88rem; color:#78350F; margin-bottom:0.5rem; }
.colleges-box strong { display:block; font-size:0.68rem; font-weight:800; color:#B45309; text-transform:uppercase; letter-spacing:0.1em; margin-bottom:0.4rem; }
.salary-note { font-size:0.75rem; color:var(--muted); font-weight:600; text-align:center; }

/* Empty state */
.no-results { text-align:center; padding:3rem 1rem; color:var(--muted); font-weight:700; }

/* Responsive */
@media(max-width:600px) {
  .riasec-body { grid-template-columns:1fr; }
  .detail-grid { grid-template-columns:1fr; }
  .site-header h1 { font-size:1.4rem; }
}

@media print {
  .grade-tabs, .search-wrap, .back-link { display:none !important; }
  .riasec-body.collapsed { display:grid !important; }
  .detail-panel { display:block !important; box-shadow:none !important; border:1pt solid #ccc !important; }
}
</style>
</head>
<body>

<div class="site-header">
  <a class="back-link" href="index.html">← Back to Educator Hub</a>
  <h1>📋 Browse All Careers</h1>
  <p>Tap any career to see the full profile — no quiz required</p>
</div>

<div class="grade-tabs">
  <button class="grade-tab active" data-grade="35" onclick="setGrade('35')">Grades 3–5</button>
  <button class="grade-tab" data-grade="12" onclick="setGrade('12')">Grades 1–2</button>
  <button class="grade-tab" data-grade="tkk" onclick="setGrade('tkk')">TK–K</button>
</div>

<div class="search-wrap">
  <input class="search-input" type="text" id="search-input"
    placeholder="🔍  Search careers..." oninput="filterCareers()" autocomplete="off" />
</div>

<main id="main-content"></main>

    careers:{
      construction_worker:{ label:'👷 Construction Worker', does:'Plans and constructs buildings, roads, and structures. Works with blueprints, tools, materials, and a team to bring designs to life.', income:'About $45,000–$75,000 per year; skilled trades can earn significantly more.', day:[{time:'7:00 AM',task:"Arrive at the job site and review the day's blueprints with your foreman"},{time:'8:00 AM',task:'Frame walls for a new house, measure twice, nail once'},{time:'11:00 AM',task:'Problem-solve with the team when the delivery arrives short on lumber'},{time:'1:00 PM',task:'Safety check on scaffolding before afternoon work'},{time:'3:00 PM',task:'Clean up the site, log progress, and prep materials for tomorrow'}], pathway:[{icon:'🏠',level:'Elementary School',steps:'Build things at home — cardboard, LEGO, wood scraps. Visit construction sites with a parent.'},{icon:'🏫',level:'Middle School',steps:'Take shop class or any hands-on elective. Join robotics club.'},{icon:'📐',level:'High School',steps:'Enroll in CTE building trades courses. Apply for a summer job or shadow a contractor.'},{icon:'🎓',level:'After High School',steps:'Apprenticeship programs, trade school, or community college. No 4-year degree required!'}], colleges:'Strong programs: Arizona State, Purdue, Cal Poly SLO, Milwaukee School of Engineering, and community college CTE pathways nationwide.' },
      mechanic:{ label:'🔧 Mechanic', does:'Diagnoses mechanical problems, repairs engines and parts, and performs maintenance on vehicles or other equipment.', income:'About $45,000–$80,000 per year, depending on specialty and certifications.', day:[{time:'8:00 AM',task:'Check in the first car and run a diagnostic scan'},{time:'9:00 AM',task:'Replace brake pads while listening to the engine idle'},{time:'11:30 AM',task:'Explain the repair clearly to the car owner'},{time:'1:00 PM',task:'Work on an oil change and tire rotation'},{time:'3:30 PM',task:'Update digital records and order parts for tomorrow'}], pathway:[{icon:'🔩',level:'Elementary School',steps:'Tinker with broken toys. Watch videos on how engines work.'},{icon:'⚙️',level:'Middle School',steps:'Take shop class. Learn basic tools — wrenches, screwdrivers.'},{icon:'🚗',level:'High School',steps:'Take auto tech CTE classes. Get a part-time job at a garage.'},{icon:'🎓',level:'After High School',steps:'Trade school or community college auto program (1–2 years). Earn ASE certifications.'}], colleges:'Strong auto programs: UTI, Lincoln Tech, Wyotech, and community colleges nationwide.' },

      firefighter:{ label:'🚒 Firefighter / EMT', does:'Responds to fires, medical emergencies, and rescue situations; educates communities about safety.', income:'About $50,000–$90,000 per year with benefits.', day:[{time:'7:00 AM',task:'Shift begins — check all gear and equipment'},{time:'9:00 AM',task:'Training drill — practice hose techniques and ladder placement'},{time:'11:00 AM',task:'Community outreach at a local school'},{time:'1:30 PM',task:'Emergency call: structure fire. Respond, assess, contain.'},{time:'4:00 PM',task:'Debrief with the team and file incident reports'}], pathway:[{icon:'🚒',level:'Elementary School',steps:'Learn fire safety rules. Visit your local fire station.'},{icon:'🏃',level:'Middle School',steps:'Get CPR certified. Join a Junior Firefighter program.'},{icon:'🩺',level:'High School',steps:'Enroll in EMT or public safety CTE courses.'},{icon:'🎓',level:'After High School',steps:'Fire academy (about 6 months). EMT certification.'}], colleges:'Programs: San Diego Miramar College, Columbia Southern, and community colleges with fire academy partnerships.' },

      photographer:{ label:'📸 Photographer / Videographer', does:'Captures and edits images or video to document events, tell stories, advertise products, or create artistic work.', income:'About $35,000–$75,000 per year; specialized photographers can earn more.', day:[{time:'7:00 AM',task:'Sunrise shoot for a nature photography project'},{time:'10:00 AM',task:"Edit yesterday's wedding photos in Lightroom"},{time:'2:00 PM',task:'Product photography session for a local business'},{time:'5:00 PM',task:'Update your portfolio website'}], pathway:[{icon:'📷',level:'Elementary School',steps:"Use your family's phone to practice composition."},{icon:'🖼️',level:'Middle School',steps:'Get access to a basic camera. Learn about exposure.'},{icon:'🎞️',level:'High School',steps:'Take a photography class. Build a portfolio website.'},{icon:'🎓',level:'After High School',steps:'BFA in photography or visual communications. Portfolio is key.'}], colleges:'Strong programs: RISD, Brooks Institute, Syracuse (Newhouse), NYU Tisch, SCAD.' },
      teacher:{ label:'🍎 Teacher / Educator', does:"Plans and delivers lessons, assesses student learning, builds relationships, and supports students' intellectual and social development.", income:'About $50,000–$90,000 per year depending on grade level and district.', day:[{time:'7:30 AM',task:'Set up the classroom and review the lesson plan'},{time:'8:15 AM',task:'Teach a history lesson on the Civil Rights Movement'},{time:'10:00 AM',task:'Small group reading support'},{time:'12:00 PM',task:'Lunch + grade a set of essays'},{time:'4:30 PM',task:"Plan next week's unit"}], pathway:[{icon:'📚',level:'Elementary School',steps:'Teach things you know to younger kids. Help others with schoolwork.'},{icon:'🧑‍🏫',level:'Middle School',steps:'Tutor younger students. Volunteer at after-school programs.'},{icon:'📓',level:'High School',steps:'Volunteer in an elementary classroom. Look into teacher cadet programs.'},{icon:'🎓',level:'After High School',steps:'4-year education degree + credential program. Student teaching required.'}], colleges:'Strong programs: University of Michigan, Stanford (ed school), Teachers College (Columbia), SDSU, UCLA.' },
      counselor:{ label:'🧑‍🤝‍🧑 Counselor / Social Worker', does:'Supports individuals through personal, social, and emotional challenges by listening, providing guidance, and connecting them to resources.', income:'About $50,000–$85,000 per year for counselors; varies by specialty.', day:[{time:'8:30 AM',task:'Review case notes before appointments'},{time:'9:00 AM',task:'Individual session: guide a student through school anxiety'},{time:'11:00 AM',task:'Group session with students navigating family changes'},{time:'2:30 PM',task:'Connect a family to community resources'},{time:'4:00 PM',task:'Complete documentation'}], pathway:[{icon:'💛',level:'Elementary School',steps:'Be a kind, trustworthy friend. Learn to name and talk about feelings.'},{icon:'🤝',level:'Middle School',steps:'Join peer mediation programs. Volunteer with younger kids.'},{icon:'📖',level:'High School',steps:'Take AP Psychology. Volunteer at a community center.'},{icon:'🎓',level:'After High School',steps:"Psychology, social work degree. Master's (MSW or MA) required for licensure."}], colleges:'Strong programs: University of Michigan, USC, Columbia, UC Berkeley, Boston College.' },
      coach:{ label:'🤸 Coach / Athletic Trainer', does:'Designs and leads training programs, teaches technique and strategy, builds team culture, and motivates athletes to reach their potential.', income:'Variable — from $35,000 to $80,000+ per year.', day:[{time:'6:00 AM',task:'Early morning lift with the team'},{time:'8:00 AM',task:'Film session: review game tape with athletes'},{time:'1:00 PM',task:"Plan next week's practice structure"},{time:'3:30 PM',task:'Practice — drill work, scrimmage, and conditioning'},{time:'6:00 PM',task:'Post-practice individual check-ins with athletes'}], pathway:[{icon:'⚽',level:'Elementary School',steps:'Play multiple sports. Help younger kids learn games.'},{icon:'🏆',level:'Middle School',steps:'Become a team captain. Help coach youth sports leagues.'},{icon:'🏋️',level:'High School',steps:'Compete at a high level and coach youth leagues on the side.'},{icon:'🎓',level:'After High School',steps:"Kinesiology, physical education, or sports science degree. Coaching certifications (CSCS, NASM)."}], colleges:'Strong programs: Ohio State, University of Florida, Penn State, Oregon, SDSU, Cal Poly.' },
      social_worker:{ label:'🧑‍⚕️ Social Worker / Advocate', does:'Helps individuals and families access services, overcome challenges, and navigate complex systems like healthcare, housing, and education.', income:'About $50,000–$80,000 per year.', day:[{time:'8:30 AM',task:'Review case files for home visits'},{time:'10:00 AM',task:"Home visit: assess a family's safety and support needs"},{time:'12:00 PM',task:'Connect a client to emergency food and rental assistance'},{time:'2:00 PM',task:'Meet with a hospital team about discharge planning'},{time:'4:00 PM',task:'Complete court-required documentation'}], pathway:[{icon:'💙',level:'Elementary School',steps:'Learn about fairness. Volunteer in community service projects.'},{icon:'🏘️',level:'Middle School',steps:'Join student government or social justice clubs.'},{icon:'📋',level:'High School',steps:'Volunteer at a food bank or shelter. Intern with a nonprofit.'},{icon:'🎓',level:'After High School',steps:"Bachelor's of Social Work (BSW). Master's (MSW) required for licensed (LCSW) positions."}], colleges:'Top programs: University of Michigan, Columbia, Washington University in St. Louis, USC.' },
      business_owner:{ label:'👔 Entrepreneur / Business Owner', does:'Identifies a market need, builds a product or service, manages a team, handles finances, and adapts to challenges over time.', income:'Highly variable — dependent on the business itself.', day:[{time:'8:00 AM',task:'Review overnight sales data and customer messages'},{time:'9:30 AM',task:'Team standup'},{time:'11:00 AM',task:'Pitch your business to a potential investor'},{time:'3:00 PM',task:'Work with a designer on new product packaging'},{time:'5:00 PM',task:'Write content for social media'}], pathway:[{icon:'🍋',level:'Elementary School',steps:'Start a small business! Lemonade stand, baked goods, lawn mowing.'},{icon:'💼',level:'Middle School',steps:'Expand your business or try a new one. Join DECA or Junior Achievement.'},{icon:'📈',level:'High School',steps:'Start a real side business. Take economics and business classes.'},{icon:'🎓',level:'After High School',steps:'Business degree helpful but not required. Real-world experience matters most.'}], colleges:'Top programs: Babson, Stanford, MIT, UC Berkeley Haas, Wharton (UPenn).' },
      salesperson:{ label:'📢 Sales Professional / Account Manager', does:'Builds client relationships, explains products or services clearly, overcomes objections, and helps customers make informed decisions.', income:'About $40,000–$100,000+ per year; many roles include performance bonuses.', day:[{time:'8:00 AM',task:'Review your pipeline: which deals are close to closing?'},{time:'9:00 AM',task:'Cold outreach: email and call new prospects'},{time:'11:00 AM',task:'Product demo with a potential client'},{time:'2:30 PM',task:'Team training on new product features'},{time:'4:00 PM',task:'Prepare a proposal for a major account'}], pathway:[{icon:'💬',level:'Elementary School',steps:'Practice explaining things clearly. Run a small business.'},{icon:'🗣️',level:'Middle School',steps:'Join debate or speech club. Sell items for school fundraisers.'},{icon:'🏪',level:'High School',steps:'Take marketing or business elective. Participate in DECA. Get a retail job.'},{icon:'🎓',level:'After High School',steps:"Business, communications, or marketing degree. Many sales roles open to high school graduates."}], colleges:'Strong programs: Wharton (UPenn), Michigan Ross, Indiana Kelley, ASU, UC Davis.' },
      public_leader:{ label:'🏛️ Public Official / Policy Maker', does:'Creates or influences policy, represents constituent interests, manages public agencies, and makes decisions that affect entire communities.', income:'Highly variable — from local public service stipends to six-figure salaries.', day:[{time:'7:30 AM',task:'Read briefings on three pending policy decisions'},{time:'9:00 AM',task:'Town hall meeting: listen to constituent concerns'},{time:'1:00 PM',task:'Press conference on a new public safety initiative'},{time:'3:00 PM',task:'Review a proposed ordinance with the city attorney'},{time:'5:00 PM',task:'Community event: youth leadership ceremony'}], pathway:[{icon:'⭐',level:'Elementary School',steps:'Run for class president. Learn about your city government.'},{icon:'🗳️',level:'Middle School',steps:'Join student government. Volunteer for local civic organizations.'},{icon:'🏫',level:'High School',steps:'Take AP Government and Economics. Apply for Boys/Girls State. Intern for a local official.'},{icon:'🎓',level:'After High School',steps:"Political science, law, public policy, or economics degree. Law school or master's in public policy."}], colleges:'Strong programs: Harvard Kennedy School, Georgetown, Princeton, UCLA Luskin, UCSD GPS.' },
      movie_director:{ label:'🎬 Film Director / Media Producer', does:'Oversees all creative aspects of a film or video project — from script interpretation to casting, visual style, editing, and final delivery.', income:'Variable and project-based; successful directors can earn well above average.', day:[{time:'8:00 AM',task:'Pre-production meeting: review storyboards with the cinematographer'},{time:'10:00 AM',task:'Casting session: watch actors audition'},{time:'1:00 PM',task:'On set: direct a key scene'},{time:'4:00 PM',task:"Editing session on last week's footage"},{time:'6:30 PM',task:'Screen a rough cut with your producing team and give notes'}], pathway:[{icon:'📱',level:'Elementary School',steps:'Make short movies on a phone or tablet. Watch great films.'},{icon:'🎥',level:'Middle School',steps:'Make short films for school. Learn iMovie or DaVinci Resolve (free).'},{icon:'🎞️',level:'High School',steps:'Take film or media arts class. Submit to youth film festivals.'},{icon:'🎓',level:'After High School',steps:'Film school BFA, or work your way up from entry-level positions.'}], colleges:'Top programs: USC School of Cinematic Arts, NYU Tisch, AFI, UCLA, Chapman.' },
      adventure_guide:{ label:'🗺️ Outdoor Educator / Guide', does:'Leads groups through outdoor environments, teaches skills like navigation and ecology, ensures safety, and builds connection to the natural world.', income:'About $35,000–$70,000 per year; seasonal and geographic variation is significant.', day:[{time:'6:00 AM',task:'Pack gear, check weather, and brief the group'},{time:'7:30 AM',task:'Lead a group on a backcountry trail, teaching plant identification'},{time:'12:00 PM',task:'Treat a minor ankle sprain on the trail'},{time:'2:00 PM',task:'Teach map and compass navigation at a scenic overlook'},{time:'8:00 PM',task:'Stars, campfire, and reflections'}], pathway:[{icon:'🌲',level:'Elementary School',steps:'Spend time outdoors. Camp with family or a scouting program.'},{icon:'🏕️',level:'Middle School',steps:'Join Boy/Girl Scouts or similar program. Take a wilderness first aid class.'},{icon:'🧭',level:'High School',steps:'Lead outdoor trips. Get WFR certified. Take ecology or environmental science.'},{icon:'🎓',level:'After High School',steps:'Outdoor education degree, environmental science, or NOLS certificate.'}], colleges:'Strong programs: University of Utah, Prescott College, Colorado State, Warren Wilson, NAU.' },
      banker:{ label:'🏦 Financial Advisor / Banker', does:'Analyzes financial data, advises clients on investments and savings, manages accounts, and helps individuals or organizations plan for the future.', income:'About $55,000–$100,000+ per year; financial advisors often earn more with experience.', day:[{time:'8:00 AM',task:'Review markets and economic news'},{time:'9:30 AM',task:'Client meeting: help a family plan for college savings and retirement'},{time:'11:00 AM',task:'Review a loan application from a small business'},{time:'3:00 PM',task:'Compliance review: ensure documentation is in order'},{time:'4:30 PM',task:'Continuing education on new tax law changes'}], pathway:[{icon:'💰',level:'Elementary School',steps:"Start a savings account. Learn the difference between needs and wants."},{icon:'📈',level:'Middle School',steps:"Play stock market simulation games. Learn about budgeting."},{icon:'💳',level:'High School',steps:'Take economics and AP Statistics. Participate in DECA.'},{icon:'🎓',level:'After High School',steps:"Finance, economics, or business degree. CFP or CFA certification for advanced roles."}], colleges:'Strong programs: Wharton (UPenn), NYU Stern, Michigan Ross, Georgetown, UT Austin McCombs.' },

// Grades 1-2 shares the same career data as grades 3-5
DATA['12'].careers = DATA['35'].careers;

// ─── STATE ────────────────────────────────────────────────────────────────────
let currentGrade = '35';
let activeCardId  = null;
let activePanelId = null;

// ─── RENDER ───────────────────────────────────────────────────────────────────
function setGrade(grade) {
  currentGrade = grade;
  activeCardId  = null;
  activePanelId = null;
  document.querySelectorAll('.grade-tab').forEach(t =>
    t.classList.toggle('active', t.dataset.grade === grade));
  document.getElementById('search-input').value = '';
  renderAll();
}

function renderAll(filter='') {
  const data   = DATA[currentGrade];
  const main   = document.getElementById('main-content');
  const fl     = filter.toLowerCase().trim();

  let html = '';
  for (const code of data.order) {
    const meta   = RIASEC_META[code];
    const jobIds = data.map[code];
    const careers = jobIds.map(id => data.careers[id]).filter(Boolean);
    const visible = fl
      ? careers.filter(c => c.label.toLowerCase().includes(fl) || c.does.toLowerCase().includes(fl))
      : careers;

    if (fl && visible.length === 0) continue;

    html += `
    <div class="riasec-section" id="section-${code}">
      <div class="riasec-header open" id="header-${code}"
           style="background:${meta.light};border-color:${meta.border};color:${meta.color}"
           onclick="toggleSection('${code}')">
        <span class="r-emoji">${meta.emoji}</span>
        <div>
          <div class="r-name">${meta.name}</div>
          <div class="r-full">${meta.full}</div>
        </div>
        <span class="r-chevron">▼</span>
      </div>
      <div class="riasec-body" id="body-${code}"
           style="background:${meta.light}22;border-color:${meta.border}">
        ${visible.map(career => {
          const id = jobIds.find(id => data.careers[id] === career);
          return `<div class="career-card" id="card-${code}-${id}"
                       onclick="toggleCareer('${code}','${id}')"
                       role="button" tabindex="0"
                       aria-label="View ${career.label.replace(/^\S+\s/,'')} career profile"
                       onkeydown="if(event.key==='Enter'||event.key===' ')toggleCareer('${code}','${id}')">
            <span class="cc-emoji">${career.label.split(' ')[0]}</span>
            <div>
              <div class="cc-name">${career.label.replace(/^\S+\s/,'')}</div>
              <div class="cc-type">${meta.name}</div>
            </div>
          </div>`;
        }).join('')}
        <div class="detail-panel" id="panel-${code}"></div>
      </div>
    </div>`;
  }

  main.innerHTML = html || '<div class="no-results">No careers match that search.</div>';
}

function toggleSection(code) {
  const body   = document.getElementById('body-' + code);
  const header = document.getElementById('header-' + code);
  const collapsed = body.classList.toggle('collapsed');
  header.classList.toggle('open', !collapsed);
}

function toggleCareer(code, id) {
  const panel  = document.getElementById('panel-' + code);
  const card   = document.getElementById(`card-${code}-${id}`);
  const career = DATA[currentGrade].careers[id];
  if (!career) return;

  // If same card clicked again — close
  if (activePanelId === code && activeCardId === id) {
    panel.classList.remove('show');
    card.classList.remove('active');
    activeCardId  = null;
    activePanelId = null;
    return;
  }

  // Deactivate previous
  if (activePanelId) {
    document.getElementById('panel-' + activePanelId)?.classList.remove('show');
  }
  if (activeCardId && activePanelId) {
    document.getElementById(`card-${activePanelId}-${activeCardId}`)?.classList.remove('active');
  }

  activeCardId  = id;
  activePanelId = code;
  card.classList.add('active');

  // Build day timeline
  let dayHtml = '';
  if (Array.isArray(career.day)) {
    dayHtml = career.day.map(e =>
      `<div class="day-row"><span class="day-time">${e.time}</span><span class="day-task">${e.task}</span></div>`
    ).join('');
  } else {
    dayHtml = `<div class="day-row"><span class="day-task">${career.day}</span></div>`;
  }

  // Build pathway steps
  const stepsHtml = (career.pathway || []).map(p =>
    `<div class="pathway-step">
      <span class="pathway-step-icon">${p.icon}</span>
      <div><div class="pathway-step-label">${p.level}</div>${p.steps}</div>
    </div>`
  ).join('');

  panel.innerHTML = `
    <h3>${career.label}</h3>
    <div class="detail-grid">
      <div class="detail-box"><strong>📖 What They Do</strong>${career.does}</div>
      <div class="detail-box"><strong>💰 Approximate Earnings</strong>${career.income}</div>
    </div>
    <div class="day-box">
      <strong>☀️ A Day in the Life</strong>
      <div class="day-timeline">${dayHtml}</div>
    </div>
    <div class="pathway-section">
      <strong>🗺️ How Can You Prepare?</strong>
      <div class="pathway-steps">${stepsHtml}</div>
    </div>
    <div class="colleges-box">
      <strong>🏛️ Colleges Known for This Field</strong>
      ${career.colleges}
    </div>
    <p class="salary-note">Salary ranges are national approximations and may vary by location and experience.</p>
  `;
  panel.classList.add('show');
  setTimeout(() => panel.scrollIntoView({ behavior:'smooth', block:'nearest' }), 50);
}

function filterCareers() {
  const q = document.getElementById('search-input').value;
  activeCardId  = null;
  activePanelId = null;
  renderAll(q);
}

// Initial render
renderAll();
</script>
